# ── DATADOG SYNTHETIC API TEST — Balance Check ────────────────────────
# Validates the GET /v1/accounts/{id}/balance endpoint on gateway-api.
# This is the highest-volume authenticated route (70 hits/h, p95=16ms).
# Observed via APM span aggregation on env:staging.
#
# Docs: https://docs.datadoghq.com/synthetics/api_tests/http_tests/
# ─────────────────────────────────────────────────────────────────────

name: "Finance Balance Check — Authenticated"
type: api
subtype: http

config:
  request:
    method: GET
    url: "http://gateway-api:8080/v1/accounts/{{ SYNTHETIC_ACCOUNT_ID }}/balance"
    timeout: 10

    headers:
      Accept: "application/json"
      Authorization: "Bearer {{ SYNTHETIC_BEARER_TOKEN }}"
      # x-datadog-trace-id injected automatically by Synthetic runner

  assertions:
    - type: statusCode
      operator: is
      target: 200

    - type: header
      property: content-type
      operator: contains
      target: "application/json"

    # Response must include a numeric balance field
    - type: body
      operator: validatesJSONPath
      targetValue:
        operator: isNotEmpty
        jsonPath: "$.balance"

    # Observed p95=16ms in production — alert threshold set to 10x headroom
    - type: responseTime
      operator: lessThan
      target: 200  # milliseconds

locations:
  - aws:eu-west-1

options:
  tick_every: 60
  min_failure_duration: 0
  min_location_failed: 1

  retry:
    count: 1
    interval: 300

  monitor_options:
    renotify_interval: 120
    notify_no_data: true
    no_data_timeframe: 10

tags:
  - "env:staging"
  - "service:gateway-api"
  - "team:finance"
  - "synthetic_type:api"
  - "flow:balance-check"
  - "observed_p95:16ms"
