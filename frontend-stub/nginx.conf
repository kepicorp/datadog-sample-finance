server {
    listen 80;
    root /usr/share/nginx/html;

    # ── Static dashboard ───────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    # ── Proxy: gateway-api (Bearer JWT required) ───────────────────────
    # Routes: POST /v1/payments, GET /v1/accounts/{id}/balance
    location /v1/ {
        proxy_pass         http://gateway-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Proxy: account-service direct (no auth) ─────────────────────────
    # Exposed under /internal/accounts so the dashboard can create and
    # list accounts without going through the gateway JWT check.
    location /internal/accounts {
        rewrite ^/internal/accounts(/.*)?$ /v1/accounts$1 break;
        proxy_pass         http://account-service:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Proxy: Keycloak token + OIDC endpoints ─────────────────────────
    # The browser fetches /auth/realms/finance/.../token from the same
    # origin (localhost:3000) — nginx forwards to keycloak:8080.
    # This eliminates the cross-origin request that triggers CORS errors.
    location /auth/ {
        proxy_pass         http://keycloak:8080/;
        proxy_http_version 1.1;
        # Use Keycloak's own hostname so the iss claim in issued tokens
        # stays keycloak:8080/realms/finance (consistent with gateway-api).
        proxy_set_header   Host              keycloak:8080;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
