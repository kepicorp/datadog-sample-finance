# =============================================================================
# DatadogAgent — EKS / Bottlerocket configuration
# =============================================================================
# Applied by: make deploy-k8s-dd (auto-detected when running on EKS)
#
# EKS-specific differences from a local cluster deployment:
#   containerLogsPath  — Bottlerocket stores logs at /var/log/containers
#                        (patched at deploy time by make deploy-k8s-dd)
#   kubelet.tlsVerify  — true on EKS; nodes have valid TLS certs
#   clusterName        — set to finance-app for scoping in Datadog UI
#   tags               — adds cloud:aws and cluster:finance-app
#
# Schema: datadoghq.com/v2alpha1 (Operator >= 1.0 / 1.27.x)
# Docs: https://github.com/DataDog/datadog-operator/blob/main/docs/configuration.v2alpha1.md
# =============================================================================

apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    site: datadoghq.com

    clusterName: finance-app

    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key

    tags:
      - env:staging
      - app:finance-sample-app
      - cloud:aws
      - cluster:finance-app

    kubelet:
      tlsVerify: true # EKS nodes have valid kubelet TLS certs

  features:
    apm:
      enabled: true
      hostPortConfig:
        enabled: true
        hostPort: 8126

    logCollection:
      enabled: true
      containerCollectAll: true
      # Bottlerocket stores logs here — not /var/lib/docker/containers
      # This value is patched at deploy time by make deploy-k8s-dd
      containerLogsPath: /var/log/containers

    liveProcessCollection:
      enabled: true

    dogstatsd:
      hostPortConfig:
        enabled: true
        hostPort: 8125

    liveContainerCollection:
      enabled: true

    orchestratorExplorer:
      enabled: true

    clusterChecks:
      enabled: true

    admissionController:
      enabled: true
      mutateUnlabelled: false

  override:
    clusterAgent:
      replicas: 2
