# =============================================================================
# DatadogAgent — EKS overlay PATCH (deltas only)
# =============================================================================
# This is a strategic-merge patch applied on top of the shared base at
# deploy/kubernetes/datadog/agent/datadog-agent.yaml (see kustomization.yaml
# in this directory). It intentionally contains ONLY the values that differ
# on EKS — every feature (APM, logs, DSM, ASM, CWS, CSPM, ...) is inherited
# from the base so the two environments can never drift apart again.
#
# EKS-specific deltas:
#   clusterName        — scopes the cluster in the Datadog UI
#   tags               — adds cloud:aws and cluster:finance-app
#   kubelet.tlsVerify  — true on EKS (nodes have valid kubelet TLS certs)
#
# NOTE: containerLogsPath is NOT overridden here. Both EKS Bottlerocket and
# local containerd nodes use /var/log/containers, which the base already sets.
#
# Schema: datadoghq.com/v2alpha1 (Operator >= 1.0)
# =============================================================================
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    clusterName: finance-app
    tags:
      - env:staging
      - app:finance-sample-app
      - cloud:aws
      - cluster:finance-app
    kubelet:
      tlsVerify: true # EKS nodes have valid kubelet TLS certs
