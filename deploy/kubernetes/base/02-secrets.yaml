# =============================================================================
# Finance Sample App — Secrets (template)
# =============================================================================
# ⚠  WARNING: This file contains PLACEHOLDER values only.
#    Never commit real credentials to source control.
#
# Before applying, replace every value that reads REPLACE_WITH_* with a real
# secret, or use one of the following GitOps-safe approaches:
#
#   Option A — kubectl imperative (dev / quickstart):
#     kubectl create secret generic app-secrets \
#       --from-literal=postgres-password=<pw> \
#       --from-literal=postgres-user=<user> \
#       --from-literal=artemis-user=<user> \
#       --from-literal=artemis-password=<pw> \
#       --from-literal=keycloak-admin-password=<pw> \
#       --from-literal=keycloak-client-secret=<secret> \
#       -n finance
#
#   Option B — Sealed Secrets (GitOps-safe):
#     https://github.com/bitnami-labs/sealed-secrets
#
#   Option C — External Secrets Operator (AWS Secrets Manager / GCP Secret Manager):
#     https://external-secrets.io/
#
# Usage (after substituting values):
#   kubectl apply -f deploy/kubernetes/base/02-secrets.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: finance
type: Opaque
# stringData accepts plain-text values and encodes them to base64 automatically.
# This avoids the need to manually base64-encode values during development.
stringData:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres-user:     "REPLACE_WITH_POSTGRES_USER"
  postgres-password: "REPLACE_WITH_POSTGRES_PASSWORD"

  # ── ActiveMQ Artemis ────────────────────────────────────────────────────────
  artemis-user:     "REPLACE_WITH_ARTEMIS_USER"
  artemis-password: "REPLACE_WITH_ARTEMIS_PASSWORD"

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak-admin-password: "REPLACE_WITH_KEYCLOAK_ADMIN_PASSWORD"
  # OIDC client secret for the `finance-gateway` client in the `finance` realm.
  keycloak-client-secret:  "REPLACE_WITH_KEYCLOAK_CLIENT_SECRET"
