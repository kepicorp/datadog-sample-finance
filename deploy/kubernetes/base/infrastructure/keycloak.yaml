# =============================================================================
# Finance Sample App — Keycloak (Identity Provider)
# =============================================================================
# Keycloak is used by gateway-api to validate bearer tokens (OIDC / JWT).
# The `finance` realm and the `finance-gateway` OIDC client are imported
# automatically at startup via the realm-import volume.
#
# IMPORTANT — Create the realm ConfigMap before applying this file:
#
#   kubectl create configmap keycloak-realm-import \
#     --from-file=deploy/kubernetes/base/keycloak-realm/ \
#     -n finance
#
# The ConfigMap mounts all JSON files from that directory into
# /opt/keycloak/data/import so Keycloak imports them on first boot.
#
# `start-dev` mode is used here for simplicity. For production, switch to
# `start` with a proper hostname, TLS, and an external PostgreSQL backend:
#   https://www.keycloak.org/server/configuration
# =============================================================================

# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: finance
  labels:
    app: keycloak
    component: infrastructure
spec:
  # NodePort 30089 exposes Keycloak directly on the host so the browser
  # talks to Keycloak without going through nginx.
  # This avoids cookie Secure/SameSite issues that arise when proxying
  # Keycloak's admin and account consoles through a plain-HTTP nginx.
  # The finance dashboard (port 30080) still talks to Keycloak internally
  # via ClusterIP DNS — only the browser uses 30089.
  type: NodePort
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30089

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: finance
  labels:
    app: keycloak
    component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        component: infrastructure
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          imagePullPolicy: IfNotPresent

          # In Kubernetes, `args` appends to the Keycloak ENTRYPOINT (/opt/keycloak/bin/kc.sh).
          # Using `command` would try to execute 'start-dev' as a standalone binary, which fails.
          # start-dev enables H2 in-process DB and disables TLS — dev/local only.
          # --import-realm causes Keycloak to scan /opt/keycloak/data/import on startup.
          args:
            - start-dev
            - --import-realm

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: keycloak-admin-password
            # Disable TLS and strict hostname checks for dev/local use.
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_LOG_LEVEL
              value: "INFO"
            # Set the public-facing URL explicitly so Keycloak builds correct
            # issuer URLs and redirect URIs for both the finance dashboard
            # and the admin console.
            # KC_HOSTNAME_URL overrides all URL construction in Keycloak 26.
            # For EKS, patch this to the NLB hostname via the Kustomize overlay.
            # KC_HOSTNAME_URL tells Keycloak its public-facing URL so it
            # builds correct issuer URLs and redirect URIs.
            # Value comes from KEYCLOAK_PUBLIC_URL in app-config:
            #   Local: http://localhost:30089 (NodePort direct)
            #   EKS:   patched by Kustomize overlay to the NLB hostname
            - name: KC_HOSTNAME_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KEYCLOAK_PUBLIC_URL
            - name: KC_HOSTNAME_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KEYCLOAK_PUBLIC_URL

          # ── Health checks ──────────────────────────────────────────────
          # TCP probes are used because:
          #   1. Keycloak 26 in dev mode puts /health/* on the management port
          #      (9000), NOT the main HTTP port (8080).
          #   2. This matches the Docker Compose health check strategy.
          # Realm import adds ~15-30 s to startup, so initialDelaySeconds is generous.
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          volumeMounts:
            # Realm JSON files are read from this directory on first boot.
            # The ConfigMap must be created with:
            #   kubectl create configmap keycloak-realm-import \
            #     --from-file=deploy/kubernetes/base/keycloak-realm/ \
            #     -n finance
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true

      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
