# =============================================================================
# Finance Sample App — Redis
# =============================================================================
# Redis is used by gateway-api as a session store and cache.
# `--appendonly yes` enables AOF persistence so the cache survives pod restarts.
#
# NOTE: A single-replica Deployment is sufficient for development.
# For production, consider Redis Sentinel or a managed service (ElastiCache,
# Cloud Memorystore).
# =============================================================================

# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: finance
  labels:
    app: redis
    component: infrastructure
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: finance
  labels:
    app: redis
    component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: infrastructure
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent

          command:
            - redis-server
            - --appendonly
            - "yes"

          ports:
            - name: redis
              containerPort: 6379

          # ── Health checks ──────────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          emptyDir: {}   # Replace with a PVC for durable storage in production
