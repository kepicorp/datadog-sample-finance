# =============================================================================
# Finance Sample App — frontend (nginx)
# =============================================================================
# Nginx reverse proxy that sits in front of all backend services.
# Routing rules:
#   /v1/           →  gateway-api:8080        (all authenticated API traffic)
#   /internal/accounts → account-service:8081  (internal dashboard, rewrites to /v1/accounts)
#   /auth/         →  keycloak:8080/           (Keycloak login / OIDC flows)
#   /              →  serves static placeholder index.html
#
# Access the dashboard at http://localhost:30080 after port-forwarding or via NodePort:
#   kubectl port-forward svc/frontend 30080:80 -n finance
#   OR — if your cluster supports NodePort — just open http://<node-ip>:30080
# =============================================================================

# ── nginx config ConfigMap ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-frontend-config
  namespace: finance
  labels:
    app: frontend
    component: service
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # ── API gateway — all /v1/ traffic goes to gateway-api ────────────────
        location /v1/ {
            proxy_pass         http://gateway-api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Internal accounts dashboard — rewrites URI before proxying ─────────
        # /internal/accounts  →  account-service:8081/v1/accounts
        location /internal/accounts {
            rewrite ^/internal/accounts(.*)$ /v1/accounts$1 break;
            proxy_pass         http://account-service:8081;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }



        # ── Gateway-API health ───────────────────────────────────────────────────
        location = /health {
            proxy_pass         http://gateway-api:8080/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Static frontend ────────────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── nginx health endpoint (used by liveness/readiness probes) ──────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

  # index.html is served from a separate ConfigMap (frontend-dashboard)
  # created by 'make deploy-k8s' from frontend-stub/index.html.
  # The nginx ConfigMap only holds the site configuration.

---
# ── Service (NodePort) ─────────────────────────────────────────────────────────
# Access the dashboard at http://localhost:30080 after port-forwarding or via NodePort.
# NodePort 30080 is accessible from outside the cluster on any node IP.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: finance
  labels:
    app: frontend
    component: service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finance
  labels:
    app: frontend
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        component: service
    spec:
      containers:
        - name: frontend
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80

          # ── Health checks ──────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          volumeMounts:
            # nginx site config
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            # Finance dashboard UI (from frontend-stub/index.html)
            # Created by 'make deploy-k8s' as the frontend-dashboard ConfigMap.
            - name: frontend-dashboard
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-frontend-config
        - name: frontend-dashboard
          configMap:
            name: frontend-dashboard
