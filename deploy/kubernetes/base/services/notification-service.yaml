# =============================================================================
# Finance Sample App — notification-service (Go)
# =============================================================================
# Async notification consumer. Responsibilities:
#   - Listens on `alert.queue` via STOMP (ActiveMQ Artemis)
#   - Sends email / SMS stubs based on alert payload
#
# This service exposes no HTTP port — it is a pure message consumer.
# There is therefore no Service resource in this file.
# =============================================================================

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: finance
  labels:
    app: notification-service
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      annotations:
        # NOTE: Go does NOT support single-step library injection like
        # Python/JS/Java — the Admission Controller injects no init container for
        # Go, so this annotation is effectively a no-op (kept only for parity /
        # documentation). Go APM is enabled in-code via tracer.Start() (see
        # main.go) plus compile-time instrumentation (orchestrion), not here.
        # Docs: https://docs.datadoghq.com/tracing/trace_collection/automatic_instrumentation/single-step-apm/
        admission.datadoghq.com/go-lib.version: latest
        ad.datadoghq.com/notification-service.logs: '[{"source":"go","service":"notification-service"}]'
      labels:
        app: notification-service
        component: service
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "staging"
        tags.datadoghq.com/service: "notification-service"
        tags.datadoghq.com/version: "latest"
    spec:
      # notification-service exits after max retries if ActiveMQ is not reachable.
      # The init container ensures it only starts once the STOMP port is open.
      initContainers:
        - name: wait-for-activemq
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              'until nc -z activemq-artemis 61613; do echo "waiting for activemq stomp..."; sleep 3; done',
            ]
      containers:
        - name: notification-service
          image: finance-sample-app-notification-service:latest
          imagePullPolicy: IfNotPresent

          # No ports — this is a JMS consumer only.

          env:
            # ── ActiveMQ (STOMP) ────────────────────────────────────────────────
            # The Go service reads credentials from the URL itself (url.Parse),
            # not from separate ACTIVEMQ_USER/PASSWORD vars. K8s env-var
            # substitution ($(VAR)) is used to embed the secret values in the URL.
            - name: ARTEMIS_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: artemis-user
            - name: ARTEMIS_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: artemis-password
            - name: ACTIVEMQ_URL
              value: "stomp://$(ARTEMIS_USER):$(ARTEMIS_PASS)@activemq-artemis:61613"
            # ── Queue configuration ──────────────────────────────────────────
            - name: ALERT_QUEUE
              value: "alert.queue"

            # ── Health check ───────────────────────────────────────────────────
            # Verify the main consumer process is alive.
            # ── Datadog Unified Service Tagging ─────────────────────────────
            - name: DD_ENV
              value: "staging"
            - name: DD_SERVICE
              value: "notification-service"
            - name: DD_VERSION
              value: "latest"
            # DD_AGENT_HOST uses the node's IP so the pod sends traces/metrics
            # to the DaemonSet agent running on the same node.
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # ── APPLICATION SECURITY MANAGEMENT (ASM) ───────────────────────
            # Enables AppSec threat detection in the tracer. Works alongside
            # the Agent-side asm.threats feature in datadog-agent.yaml.
            # Detects SQLi, XSS, SSRF and business-logic attacks at runtime.
            # Docs: https://docs.datadoghq.com/security/application_security/
            - name: DD_APPSEC_ENABLED
              value: "true"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'notification' > /dev/null"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
