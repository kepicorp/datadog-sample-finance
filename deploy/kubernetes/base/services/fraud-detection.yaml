# =============================================================================
# Finance Sample App — fraud-detection (Python)
# =============================================================================
# Async fraud-scoring consumer. Responsibilities:
#   - Listens on `fraud.score.queue` via STOMP (ActiveMQ Artemis)
#   - Scores transactions and emits results back to the broker
#
# This service exposes no HTTP port — it is a pure message consumer.
# There is therefore no Service resource in this file.
#
# Health check strategy: exec into the container and verify the STOMP
# connection process is running, as there is no HTTP endpoint.
# =============================================================================

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: finance
  labels:
    app: fraud-detection
    component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection
  template:
    metadata:
      annotations:
        # Datadog single-step instrumentation — inject python tracer at pod startup.
        # Pinned to the tracer's MAJOR version (Datadog publishes floating vN
        # init-image tags). More reproducible than "latest" (no surprise major
        # bumps) while still receiving patches; always resolvable — unlike exact
        # patch tags, which don't reliably exist as init-image tags.
        admission.datadoghq.com/python-lib.version: "v2"
        ad.datadoghq.com/fraud-detection.logs: '[{"source":"python","service":"fraud-detection"}]'
      labels:
        app: fraud-detection
        component: service
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "staging"
        tags.datadoghq.com/service: "fraud-detection"
        tags.datadoghq.com/version: "latest"
    spec:
      # fraud-detection exits after connection failures if ActiveMQ is not reachable.
      # The init container ensures it only starts once the STOMP port is open.
      initContainers:
        - name: wait-for-activemq
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              'until nc -z activemq-artemis 61613; do echo "waiting for activemq stomp..."; sleep 3; done',
            ]
      containers:
        - name: fraud-detection
          image: finance-sample-app-fraud-detection:latest
          imagePullPolicy: IfNotPresent

          # No ports — this is a JMS consumer only.

          env:
            # ── ActiveMQ (STOMP) ────────────────────────────────────────────────
            # The Python stomp.py client reads host/port/credentials separately.
            # STOMP_HOST, STOMP_PORT, STOMP_USER, STOMP_PASS match main.py's os.environ.get() calls.
            - name: STOMP_HOST
              value: "activemq-artemis"
            - name: STOMP_PORT
              value: "61613"
            - name: STOMP_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: artemis-user
            - name: STOMP_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: artemis-password
            # ── Queue configuration ──────────────────────────────────────────
            - name: FRAUD_QUEUE
              value: "fraud.score.queue"

            # ── Health check ───────────────────────────────────────────────────
            # Verify the main consumer process is alive.
            # Adjust the process name to match your entrypoint if needed.
            # /proc/1 always exists while the main process (PID 1) is alive.
            # pgrep is not available in minimal Python images, so we use /proc directly.
            # ── Datadog Unified Service Tagging ─────────────────────────────
            - name: DD_ENV
              value: "staging"
            - name: DD_SERVICE
              value: "fraud-detection"
            - name: DD_VERSION
              value: "latest"
            # DD_AGENT_HOST uses the node's IP so the pod sends traces/metrics
            # to the DaemonSet agent running on the same node.
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # ── APPLICATION SECURITY MANAGEMENT (ASM) ───────────────────────
            # Enables AppSec threat detection in the tracer. Works alongside
            # the Agent-side asm.threats feature in datadog-agent.yaml.
            # Detects SQLi, XSS, SSRF and business-logic attacks at runtime.
            # Docs: https://docs.datadoghq.com/security/application_security/
            - name: DD_APPSEC_ENABLED
              value: "true"
            # ── DATA STREAMS MONITORING (DSM) ───────────────────────────────
            # JMS consumer on fraud.score.queue. Enabling the flag turns DSM on;
            # for full pipeline stitching a Python consumer checkpoint
            # (ddtrace set_consume_checkpoint) may be required (see docs).
            # Docs: https://docs.datadoghq.com/data_streams/python/
            - name: DD_DATA_STREAMS_ENABLED
              value: "true"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "[ -d /proc/1 ]"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
