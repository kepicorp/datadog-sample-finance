# =============================================================================
# Finance Sample App — batch-processor (Java / Spring Batch)
# =============================================================================
# Nightly reconciliation and settlement batch job. Responsibilities:
#   - End-of-day reconciliation (ReconciliationJob)
#   - Monthly statement generation (StatementJob)
#   - Reads/writes to the `ledger` PostgreSQL database
#
# Exposes an HTTP port (8083) for two purposes:
#   - On-demand job triggers: POST /jobs/reconciliation, POST /jobs/statement
#     (see BatchJobController) — used by the traffic generator so this demo
#     produces batch.job / batch.step spans without waiting for a cron.
#   - Spring Boot Actuator health/metrics endpoints.
# In production, prefer scheduling via @Scheduled cron or a Kubernetes CronJob
# and treat the HTTP trigger as a manual/demo-only escape hatch.
#
# Resource limits are intentionally higher than other services because batch
# jobs are CPU and memory intensive during peak processing windows.
#
# NOTE: For production, consider running batch jobs as a Kubernetes CronJob
# instead of a long-running Deployment, so pods are created on demand and
# resources are released after each run.
# =============================================================================

# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: batch-processor
  namespace: finance
  labels:
    app: batch-processor
    component: service
spec:
  type: ClusterIP
  selector:
    app: batch-processor
  ports:
    - name: http
      port: 8083
      targetPort: 8083

---
# ── Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-processor
  namespace: finance
  labels:
    app: batch-processor
    component: service
spec:
  # Only one instance should run at a time to prevent duplicate batch runs.
  replicas: 1
  selector:
    matchLabels:
      app: batch-processor
  template:
    metadata:
      annotations:
        # Datadog single-step instrumentation — inject java tracer at pod startup
        admission.datadoghq.com/java-lib.version: latest
        ad.datadoghq.com/batch-processor.logs: '[{"source":"java","service":"batch-processor"}]'
      labels:
        app: batch-processor
        component: service
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "staging"
        tags.datadoghq.com/service: "batch-processor"
        tags.datadoghq.com/version: "latest"
    spec:
      # Wait for PostgreSQL before starting Spring Batch — it creates
      # its metadata tables on first run (initialize-schema: always).
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              'until nc -z postgres-ledger 5432; do echo "waiting for postgres..."; sleep 3; done',
            ]
      containers:
        - name: batch-processor
          image: finance-sample-app-batch-processor:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8083

          env:
            # ── Spring Boot DataSource ────────────────────────────────────────
            # Spring Boot auto-configures a DataSource from these properties.
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-password

            # ── Datadog Unified Service Tagging ─────────────────────────────
            - name: DD_ENV
              value: "staging"
            - name: DD_SERVICE
              value: "batch-processor"
            - name: DD_VERSION
              value: "latest"
            # DD_AGENT_HOST uses the node's IP so the pod sends traces/metrics
            # to the DaemonSet agent running on the same node.
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # ── APPLICATION SECURITY MANAGEMENT (ASM) ───────────────────────
            # Enables AppSec threat detection in the tracer. Works alongside
            # the Agent-side asm.threats feature in datadog-agent.yaml.
            # Detects SQLi, XSS, SSRF and business-logic attacks at runtime.
            # Docs: https://docs.datadoghq.com/security/application_security/
            - name: DD_APPSEC_ENABLED
              value: "true"
          # HTTP probes against Spring Boot Actuator — batch-processor now
          # runs an embedded web server (spring-boot-starter-web) to expose
          # the on-demand job trigger endpoints (/jobs/reconciliation,
          # /jobs/statement) alongside /actuator/health.
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
