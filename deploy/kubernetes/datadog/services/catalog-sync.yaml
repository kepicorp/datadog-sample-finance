# =============================================================================
# Datadog Service Catalog — Entity Registration
# =============================================================================
# This pod mounts all service.datadog.yaml files and exposes them to the
# Datadog Agent via the ad.datadoghq.com/catalog.check annotation.
# The Agent's catalog check autodiscovers these files and registers them
# with the Service Catalog via the internal catalog intake API.
#
# Docs: https://docs.datadoghq.com/service_catalog/
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-sync
  namespace: finance
  labels:
    app: catalog-sync
    component: datadog-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-sync
  template:
    metadata:
      labels:
        app: catalog-sync
        component: datadog-catalog
        tags.datadoghq.com/env: "staging"
        tags.datadoghq.com/service: "catalog-sync"
        tags.datadoghq.com/version: "latest"
      annotations:
        # Tell the Datadog Agent to scan /etc/dd-catalog/ for entity files.
        ad.datadoghq.com/catalog-sync.checks: |
          {
            "catalog": {
              "init_config": {},
              "instances": [
                {"catalog_dir": "/etc/dd-catalog"}
              ]
            }
          }
    spec:
      containers:
        - name: catalog-sync
          # Minimal container — just needs to stay alive so the Agent can read
          # the mounted files via the autodiscovery annotation above.
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          volumeMounts:
            - name: catalog-files
              mountPath: /etc/dd-catalog
      volumes:
        - name: catalog-files
          configMap:
            name: finance-service-catalog
