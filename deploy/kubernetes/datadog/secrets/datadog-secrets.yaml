# ── DATADOG SECRETS — EXAMPLE TEMPLATE ───────────────────────────────────────
# ⚠ WARNING: This file contains PLACEHOLDER values only.
#   Never commit real API or App keys to source control.
#
# This secret holds three keys used by the Finance sample app:
#   api-key      → Datadog Agent authentication (required)
#   app-key      → Datadog API write access for Terraform resources (required)
#   dbm-password → Read-only PostgreSQL monitoring user password (required for DBM)
#
# ── HOW TO CREATE THE SECRET ──────────────────────────────────────────────────
#
# Option A — From .env file (local cluster, fastest):
#   make create-dd-secret
#   Reads DD_API_KEY and DD_APP_KEY from .env at the project root.
#
# Option B — kubectl literals (explicit, works anywhere):
#   kubectl create namespace datadog --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic datadog-secret \
#     --from-literal api-key=<YOUR_DD_API_KEY> \
#     --from-literal app-key=<YOUR_DD_APP_KEY> \
#     --from-literal dbm-password=<YOUR_DBM_PASSWORD> \
#     --namespace datadog \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Option C — From AWS Secrets Manager (EKS, automated via make deploy-k8s-dd):
#   Requires secrets at:
#     finance-app/staging/dd-api-key
#     finance-app/staging/dd-app-key
#     finance-app/staging/dbm-password   (optional, for DBM)
#   Run:  make create-dd-secret   (auto-detects EKS vs local)
#
# Option D — Sealed Secrets / SOPS / External Secrets Operator (GitOps):
#   See the ExternalSecret example below.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# ExternalSecret example (AWS Secrets Manager via External Secrets Operator):
#
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: datadog-secret
#     namespace: datadog
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: aws-secrets-manager
#       kind: ClusterSecretStore
#     target:
#       name: datadog-secret
#     data:
#       - secretKey: api-key
#         remoteRef:
#           key: finance-app/staging/dd-api-key
#       - secretKey: app-key
#         remoteRef:
#           key: finance-app/staging/dd-app-key
#       - secretKey: dbm-password
#         remoteRef:
#           key: finance-app/staging/dbm-password
#
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: datadog
  labels:
    app.kubernetes.io/name: datadog-secret
    app.kubernetes.io/part-of: finance-sample-app
  annotations:
    # Document that this secret must be managed outside of Git in production.
    # Use 'make create-dd-secret' locally, or External Secrets Operator on EKS.
    management: "use-make-create-dd-secret-or-external-secrets-operator"
type: Opaque
# ── stringData (plain text — template only, never commit real values) ─────────
# In production use 'data:' with base64-encoded values, or External Secrets.
stringData:
  api-key: "REPLACE_WITH_YOUR_DATADOG_API_KEY" # app.datadoghq.com > Organization Settings > API Keys
  app-key: "REPLACE_WITH_YOUR_DATADOG_APP_KEY" # app.datadoghq.com > Organization Settings > Application Keys
  dbm-password: "REPLACE_WITH_POSTGRES_MONITORING_PASSWORD" # password for the 'datadog' PostgreSQL read-only user
