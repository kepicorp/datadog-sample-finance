# ── DATADOG SECRETS — EXAMPLE ONLY ───────────────────────────────────────────
# ⚠ WARNING: This file is an EXAMPLE TEMPLATE only.
#   DO NOT commit real secret values to source control.
#   The placeholder values below are fake and must be replaced before use.
#
# ── HOW TO USE THIS FILE ──────────────────────────────────────────────────────
#
# Option A — kubectl (simplest, non-GitOps):
#   kubectl create secret generic datadog-secret \
#     --from-literal api-key=<YOUR_REAL_DD_API_KEY> \
#     --from-literal dbm-password=<YOUR_REAL_DBM_PASSWORD> \
#     --namespace datadog
#
# Option B — Apply with real base64 values (GitOps with encrypted secrets):
#   1. Encode your values (do NOT commit the encoded values in plaintext):
#        echo -n "your-api-key" | base64
#        echo -n "your-dbm-password" | base64
#   2. Replace the placeholder values in this file
#   3. Encrypt with a tool such as:
#        - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#        - SOPS + age  (https://github.com/mozilla/sops)
#        - External Secrets Operator (see Option C)
#
# Option C — External Secrets Operator (recommended for production):
#   Use ExternalSecret CRD to pull secrets from:
#     - AWS Secrets Manager
#     - GCP Secret Manager
#     - HashiCorp Vault
#   Docs: https://external-secrets.io/
#   Example ExternalSecret for AWS Secrets Manager:
#
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: datadog-secret
#     namespace: datadog
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: aws-secrets-manager
#       kind: ClusterSecretStore
#     target:
#       name: datadog-secret
#     data:
#       - secretKey: api-key
#         remoteRef:
#           key: finance-sample-app/datadog
#           property: DD_API_KEY
#       - secretKey: dbm-password
#         remoteRef:
#           key: finance-sample-app/datadog
#           property: POSTGRES_DATADOG_PASSWORD
#
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: datadog
  labels:
    app.kubernetes.io/name: datadog-secret
    app.kubernetes.io/part-of: finance-sample-app
  annotations:
    # Document that this secret must be managed outside of Git in real deployments
    management: "replace-with-external-secrets-operator-or-sealed-secrets"
type: Opaque
# ── stringData (plain text — for templating/testing only) ─────────────────────
# In production, use 'data:' with base64-encoded values, or External Secrets.
# Never commit real values here.
stringData:
  api-key: "REPLACE_WITH_YOUR_DATADOG_API_KEY"          # From app.datadoghq.com > Organization Settings > API Keys
  dbm-password: "REPLACE_WITH_POSTGRES_MONITORING_PASSWORD"  # Password for the 'datadog' PostgreSQL read-only user
