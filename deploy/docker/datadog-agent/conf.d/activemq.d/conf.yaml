# ══════════════════════════════════════════════════════════════════════════════
# Datadog Agent — ActiveMQ Artemis JMX Integration
# File: /etc/datadog-agent/conf.d/activemq.d/conf.yaml
# ══════════════════════════════════════════════════════════════════════════════
#
# Learning Progression Step 10 — Data Streams Monitoring (DSM) + ActiveMQ metrics
#
# Docs: https://docs.datadoghq.com/integrations/activemq/
# ══════════════════════════════════════════════════════════════════════════════

init_config:
  is_jmx: true
  collect_default_metrics: true

instances:
  - host: activemq-artemis
    port: 1099
    # JMX auth disabled on the dev container — no user/password needed.
    # For staging/prod: enable JMX auth in Artemis and set user/password here.

    tags:
      - "broker:activemq-artemis"
      - "env:staging"
      - "service:activemq-artemis"

    conf:
      - include:
          domain: org.apache.activemq.artemis
          type: Broker
          attribute:
            TotalMessageCount:
              alias: activemq.artemis.broker.message_count
              metric_type: gauge
            TotalConsumerCount:
              alias: activemq.artemis.broker.consumer_count
              metric_type: gauge
            AddressMemoryUsagePercentage:
              alias: activemq.artemis.broker.address_memory_usage_pct
              metric_type: gauge

      - include:
          domain: org.apache.activemq.artemis
          type: Queue
          attribute:
            MessageCount:
              alias: activemq.artemis.queue.message_count
              metric_type: gauge
            ConsumerCount:
              alias: activemq.artemis.queue.consumer_count
              metric_type: gauge
            MessagesAdded:
              alias: activemq.artemis.queue.messages_added
              metric_type: monotonic_count
            MessagesAcknowledged:
              alias: activemq.artemis.queue.messages_acknowledged
              metric_type: monotonic_count
        bean_tags:
          - "messaging.destination"
          - "queue_name"
