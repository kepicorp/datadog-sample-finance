# ══════════════════════════════════════════════════════════════════════════════
# Datadog Agent — PostgreSQL / DBM Integration
# File: /etc/datadog-agent/conf.d/postgres.d/conf.yaml
# ══════════════════════════════════════════════════════════════════════════════
#
# Learning Progression Step 9 — Database Monitoring (DBM)
#
# PREREQUISITES (already done for local dev):
#   CREATE USER datadog WITH PASSWORD '<DATADOG_DBM_PASSWORD>';
#   GRANT pg_monitor TO datadog;
#   GRANT SELECT ON pg_stat_database TO datadog;
#   CREATE EXTENSION IF NOT EXISTS pg_stat_statements SCHEMA public;
#
# Docs: https://docs.datadoghq.com/database_monitoring/setup_postgres/selfhosted/
# DBM + APM correlation: https://docs.datadoghq.com/database_monitoring/connect_dbm_and_apm/
# ══════════════════════════════════════════════════════════════════════════════

init_config: {}

instances:
  - host: postgres-ledger
    port: 5432
    username: datadog
    password: datadog_dbm_dev # dev only — use ENC[] or K8s Secret in staging/prod
    database: ledger
    dbm: true
    ignore_databases:
      - postgres
      - template0
      - template1

    query_metrics:
      enabled: true
      run_sync: false

    query_samples:
      enabled: true
      collections_per_second: 1
      explain_parameterized_queries: true

    schema_monitoring:
      enabled: true

    custom_queries:
      - metric_prefix: finance.db.ledger
        query: >
          SELECT count(*) AS pending_count
          FROM transactions
          WHERE status = 'pending'
            AND created_at < NOW() - INTERVAL '5 minutes'
        columns:
          - name: pending_count
            type: gauge
        tags:
          - "table:transactions"
          - "check:stuck_pending"

    tags:
      - "db:ledger"
      - "db.instance:postgres-ledger"
      - "env:staging"
      - "service:postgres-ledger"
